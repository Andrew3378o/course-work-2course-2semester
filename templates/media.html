{% extends "base.html" %}
{% block title %}Media Library - Thematic Wiki{% endblock %}
{% block content %}
<h2>Media Library</h2>
<div class="manage-header-box">
    <h4 class="manage-header-title">Upload New Image:</h4>
    <form action="{{ url_for('api_upload_image') }}" method="POST" enctype="multipart/form-data" class="inline-flex-form">
        <input type="file" name="file" required class="input-no-margin">
        <button type="submit" class="btn-no-margin">Upload</button>
    </form>
</div>
<h3>Uploaded Files</h3>
<div class="articles-grid">
    {% for media in media_files %}
    <div class="article-card media-card-wrapper">
        <img src="{{ url_for('static', filename='uploads/' + media.filename) }}" class="media-card-img" alt="Media File">
        <p class="media-card-title">{{ media.filename }}</p>
        <form action="{{ url_for('delete_media', media_id=media.id) }}" method="POST" class="form-full-width">
            <button type="submit" class="btn-danger-full">Delete File</button>
        </form>
    </div>
    {% endfor %}
</div>
{% endblock %}
