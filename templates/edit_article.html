{% extends "base.html" %}

{% block title %}Edit Article - Thematic Wiki{% endblock %}

{% block content %}
<h2>Edit Article</h2>

<form action="{{ url_for('edit_article', article_id=article.id) }}" method="POST" id="article-form">
    <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
        <div style="flex: 2; min-width: 250px;">
            <label style="font-weight: 500; display: block; margin-bottom: 5px;">Title</label>
            <input type="text" name="title" value="{{ article.title }}" required>
        </div>
        <div style="flex: 1; min-width: 200px;">
            <label style="font-weight: 500; display: block; margin-bottom: 5px;">Category</label>
            <select name="category_id">
                <option value="">No Category</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if article.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="editor-toolbar">
        <button type="button" class="tool-btn" onclick="insertLineStart('# ')">H1</button>
        <button type="button" class="tool-btn" onclick="insertLineStart('## ')">H2</button>
        <button type="button" class="tool-btn" onclick="insertLineStart('### ')">H3</button>
        <button type="button" class="tool-btn" onclick="insertText('**', '**')">B</button>
        <button type="button" class="tool-btn" onclick="insertText('*', '*')">I</button>
        <button type="button" class="tool-btn" onclick="insertLineStart('- ')">List</button>
        <button type="button" class="tool-btn" onclick="insertLineStart('1. ')">Num List</button>
        <button type="button" class="tool-btn" onclick="insertText('[[', ']]')">Wiki</button>
        <button type="button" class="tool-btn" onclick="insertText('[', '](url)')">Link</button>
        <button type="button" class="tool-btn" onclick="document.getElementById('img-upload').click()">+ Image</button>
        <input type="file" id="img-upload" style="display:none" onchange="uploadImage(this)">
    </div>

    <div class="editor-layout">
        <div class="editor-side">
            <textarea name="content_markdown" id="editor" class="editor-textarea" required>{{ article.content_markdown }}</textarea>
        </div>
        <div class="preview-side">
            <div class="preview-header">Live Preview</div>
            <div id="preview" class="preview-content article-content"></div>
        </div>
    </div>

    <div style="margin-top: 15px;">
        <label style="font-weight: 500; display: block; margin-bottom: 5px;">Tags</label>
        <input type="text" name="tags" value="{{ tags_string }}">
    </div>

    <div style="margin-top: 20px;">
        <button type="submit">Update Article</button>
        <a href="{{ url_for('article_detail', article_id=article.id) }}" style="margin-left: 15px; color: var(--text-muted); text-decoration: none;">Cancel</a>
    </div>
</form>
{% endblock %}
