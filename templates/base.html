<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Thematic Wiki{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{{ url_for('index') }}">Thematic Wiki</a></h1>
            <nav>
                <a href="{{ url_for('index') }}">Home</a>
                <a href="{{ url_for('create_article') }}">Create Article</a>
            </nav>
        </header>
        
        <main>
            {% block content %}
            {% endblock %}
        </main>

        <footer>
            <hr>
            <p>&copy; 2026 Thematic Wiki Project</p>
        </footer>
    </div>
</body>
</html>
