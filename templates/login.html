{% extends "base.html" %}

{% block title %}Login - Thematic Wiki{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Login</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <label for="username" style="font-weight: 500; display: block; margin-bottom: 5px;">Username</label>
        <input type="text" name="username" id="username" required>
        
        <label for="password" style="font-weight: 500; display: block; margin-bottom: 5px;">Password</label>
        <input type="password" name="password" id="password" required>
        
        <button type="submit">Login</button>
    </form>
    <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
        Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
</div>
{% endblock %}
