{% extends "base.html" %}
{% block title %}Manage Categories - Thematic Wiki{% endblock %}
{% block content %}
<h2>Manage Categories</h2>
<div class="manage-header-box">
    <form action="{{ url_for('manage_categories') }}" method="POST" class="inline-flex-form">
        <input type="text" name="name" placeholder="New category name..." required class="flex-grow-input">
        <button type="submit" class="btn-no-margin">Add Category</button>
    </form>
</div>
<div class="table-responsive">
    <table>
        <thead><tr><th>ID</th><th>Name</th><th>Actions</th></tr></thead>
        <tbody>
            {% for cat in categories %}
            <tr>
                <td>{{ cat.id }}</td>
                <td class="td-font-500">{{ cat.name }}</td>
                <td>
                    <a href="{{ url_for('edit_category', id=cat.id) }}" class="action-link">Edit</a>
                    <form action="{{ url_for('delete_category', id=cat.id) }}" method="POST" class="form-inline-action">
                        <button type="submit" class="btn-danger-text">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
