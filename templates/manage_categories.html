{% extends "base.html" %}

{% block title %}Manage Categories - Thematic Wiki{% endblock %}

{% block content %}
<h2>Manage Categories</h2>

<div style="background-color: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; margin-bottom: 30px;">
    <form action="{{ url_for('manage_categories') }}" method="POST" style="display: flex; gap: 15px; margin: 0;">
        <input type="text" name="name" placeholder="New category name..." required style="margin: 0; flex-grow: 1;">
        <button type="submit" style="margin: 0;">Add Category</button>
    </form>
</div>

<div style="overflow-x: auto;">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for cat in categories %}
            <tr>
                <td>{{ cat.id }}</td>
                <td style="font-weight: 500;">{{ cat.name }}</td>
                <td>
                    <a href="{{ url_for('edit_category', id=cat.id) }}" style="margin-right: 15px;">Edit</a>
                    <form action="{{ url_for('delete_category', id=cat.id) }}" method="POST" style="display: inline; margin: 0;">
                        <button type="submit" style="background: none; border: none; color: var(--danger-color); padding: 0; cursor: pointer; text-decoration: underline; font-weight: normal;">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
