{% extends "base.html" %}
{% block title %}New Article - Thematic Wiki{% endblock %}
{% block content %}
<h2>Create New Article</h2>
<form action="{{ url_for('create_article') }}" method="POST">
    <div class="form-row">
        <div class="form-col-2">
            <label class="form-label">Title</label>
            <input type="text" name="title" value="{{ prefill_title }}" required>
        </div>
        <div class="form-col-1">
            <label class="form-label">Category</label>
            <select name="category_id">
                <option value="">No Category</option>
                {% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}
            </select>
        </div>
    </div>
    <div class="editor-toolbar">
        <button type="button" class="tool-btn" data-action="h1">H1</button>
        <button type="button" class="tool-btn" data-action="h2">H2</button>
        <button type="button" class="tool-btn" data-action="h3">H3</button>
        <button type="button" class="tool-btn" data-action="bold">B</button>
        <button type="button" class="tool-btn" data-action="italic">I</button>
        <button type="button" class="tool-btn" data-action="list">List</button>
        <button type="button" class="tool-btn" data-action="numlist">Num List</button>
        <button type="button" class="tool-btn" data-action="wiki">Wiki</button>
        <button type="button" class="tool-btn" data-action="link">Link</button>
        <button type="button" class="tool-btn" data-action="image">+ Image</button>
        <input type="file" id="img-upload" class="d-none">
    </div>
    <div class="editor-layout">
        <div class="editor-side"><textarea name="content_markdown" id="editor" class="editor-textarea" required placeholder="Start writing..."></textarea></div>
        <div class="preview-side"><div class="preview-header">Live Preview</div><div id="preview" class="preview-content article-content"></div></div>
    </div>
    <div class="form-actions">
        <label class="form-label">Tags</label>
        <input type="text" name="tags" placeholder="tag1, tag2...">
    </div>
    <div class="form-actions">
        <button type="submit">Publish Article</button>
        <a href="{{ url_for('index') }}" class="cancel-link">Cancel</a>
    </div>
</form>
{% endblock %}
