{% extends "base.html" %}

{% block title %}Edit User - Thematic Wiki{% endblock %}

{% block content %}
    <h2>Edit Role for "{{ user.username }}"</h2>
    
    <form action="{{ url_for('edit_user', user_id=user.id) }}" method="POST" style="max-width: 300px;">
        <div style="margin-bottom: 1em;">
            <label for="role" style="font-weight: bold;">User Role:</label><br>
            <select name="role" id="role" style="width: 100%; padding: 5px; margin-top: 5px;">
                <option value="Guest" {% if user.role == 'Guest' %}selected{% endif %}>Guest</option>
                <option value="Editor" {% if user.role == 'Editor' %}selected{% endif %}>Editor</option>
                <option value="Admin" {% if user.role == 'Admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>
        <button type="submit" style="padding: 5px 15px;">Update Role</button>
    </form>
    
    <p style="margin-top: 15px;"><a href="{{ url_for('manage_users') }}" style="text-decoration: none;">&larr; Cancel</a></p>
{% endblock %}
