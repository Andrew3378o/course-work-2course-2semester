{% extends "base.html" %}
{% block title %}Edit User - Thematic Wiki{% endblock %}
{% block content %}
<div class="auth-container">
    <h2 class="auth-title">Edit User Role</h2>
    <form action="{{ url_for('edit_user', user_id=user.id) }}" method="POST">
        <p class="page-subtitle">User: <strong>{{ user.username }}</strong></p>
        <label class="form-label">Role</label>
        <select name="role" required>
            <option value="Guest" {% if user.role == 'Guest' %}selected{% endif %}>Guest</option>
            <option value="Editor" {% if user.role == 'Editor' %}selected{% endif %}>Editor</option>
            <option value="Admin" {% if user.role == 'Admin' %}selected{% endif %}>Admin</option>
        </select>
        <button type="submit" class="form-input-mt">Update User</button>
        <a href="{{ url_for('manage_users') }}" class="cancel-link-block">Cancel</a>
    </form>
</div>
{% endblock %}
