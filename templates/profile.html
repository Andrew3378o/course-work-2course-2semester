{% extends "base.html" %}
{% block title %}Profile - Thematic Wiki{% endblock %}
{% block content %}
<div class="profile-container">
    <h2 class="profile-title">My Profile</h2>
    <div class="profile-info-box">
        <p class="profile-info-text"><strong>Username:</strong> {{ session.get('username') }}</p>
        <p class="profile-info-text">
            <strong>Role:</strong> 
            <span class="tag-badge ml-5">{{ session.get('role') }}</span>
        </p>
        <p class="profile-info-text"><strong>Total Edits:</strong> {{ stats.edits }} revisions made</p>
    </div>
    <h3 class="page-title-mb10">Change Password</h3>
    <form action="{{ url_for('profile') }}" method="POST">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password" required placeholder="Enter new strong password...">
        <button type="submit" class="form-input-mt">Update Password</button>
    </form>
</div>
{% endblock %}
