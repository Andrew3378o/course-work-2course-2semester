{% extends "base.html" %}

{% block title %}Register - Thematic Wiki{% endblock %}

{% block content %}
    <h2>Register</h2>
    <form action="{{ url_for('register') }}" method="POST" style="max-width: 300px;">
        <div style="margin-bottom: 1em;">
            <label for="username">Username:</label><br>
            <input type="text" id="username" name="username" required style="width: 100%; padding: 5px;">
        </div>
        <div style="margin-bottom: 1em;">
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" required style="width: 100%; padding: 5px;">
        </div>
        <button type="submit" style="padding: 5px 15px;">Register</button>
    </form>
    <p style="margin-top: 15px;">Already have an account? <a href="{{ url_for('login') }}">Log in here</a>.</p>
{% endblock %}
