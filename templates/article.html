{% extends "base.html" %}

{% block title %}{{ article.title }} - Thematic Wiki{% endblock %}

{% block content %}
    <article>
        <h2>{{ article.title }}</h2>
        
        <div class="article-content" style="margin-bottom: 2em; line-height: 1.6;">
            {{ article.html_content | safe }}
        </div>
        
        <hr>
        
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="{{ url_for('index') }}" style="text-decoration: none;">&larr; Back to home</a>
            <span>|</span>
            <a href="{{ url_for('edit_article', article_id=article.id) }}">Edit Article</a>
            <span>|</span>
            <form action="{{ url_for('delete_article', article_id=article.id) }}" method="POST" style="margin: 0;">
                <button type="submit" onclick="return confirm('Are you sure you want to delete this article?');" style="color: red; cursor: pointer;">Delete Article</button>
            </form>
        </div>
    </article>
{% endblock %}
