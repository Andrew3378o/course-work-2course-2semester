{% extends "base.html" %}

{% block title %}{{ article.title }} - Thematic Wiki{% endblock %}

{% block content %}
    <article>
        <h2>{{ article.title }}</h2>
        <div class="article-content">
            {{ article.content_markdown }}
        </div>
        <p>
            <a href="{{ url_for('index') }}" style="text-decoration: none;">&larr; Back to home</a> | 
            <a href="{{ url_for('edit_article', article_id=article.id) }}">Edit Article</a>
        </p>
    </article>
{% endblock %}
