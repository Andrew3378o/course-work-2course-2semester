{% extends "base.html" %}

{% block title %}Create Category - Thematic Wiki{% endblock %}

{% block content %}
    <h2>Create a New Category</h2>
    
    <form action="{{ url_for('create_category') }}" method="POST">
        <div style="margin-bottom: 1em;">
            <label for="name">Category Name:</label><br>
            <input type="text" id="name" name="name" required style="width: 100%; max-width: 400px;">
        </div>
        <button type="submit">Create Category</button>
    </form>
    
    <p><a href="{{ url_for('create_article') }}" style="text-decoration: none;">&larr; Back to Create Article</a></p>
{% endblock %}
